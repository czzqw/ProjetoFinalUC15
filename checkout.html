<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Tailand Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="checkout-page">

<header class="py-3">
  <div class="container d-flex justify-content-between align-items-center">
    <h1 class="h4 text-warning mb-0">Tailand Store</h1>
    <nav>
      <a class="me-3 text-light text-decoration-none" href="./index.html">Catálogo</a>
      <a class="me-3 text-light text-decoration-none" href="./menu1.html">História</a>
      <a class="text-light text-decoration-none" href="./menu3.html">Dicas</a>
    </nav>
  </div>
</header>

<main class="py-5">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card shadow-sm">
          <div class="card-body p-0">
            <!-- Bootstrap carousel -->
            <div id="checkoutCarousel" class="carousel slide" data-bs-ride="carousel">
              <div class="carousel-inner">
                <div class="carousel-item active">
                  <img src="https://images.unsplash.com/photo-1517927033932-b3d18e7a5c5a?auto=format&fit=crop&w=1400&q=60" class="d-block w-100" alt="Estádio">
                </div>
                <div class="carousel-item">
                  <img src="https://images.unsplash.com/photo-1505678261036-a3fcc5e884ee?auto=format&fit=crop&w=1400&q=60" class="d-block w-100" alt="Bola de futebol">
                </div>
                <div class="carousel-item">
                  <img src="https://images.unsplash.com/photo-1521412644187-c49fa049e84d?auto=format&fit=crop&w=1400&q=60" class="d-block w-100" alt="Torcida">
                </div>
              </div>
              <button class="carousel-control-prev" type="button" data-bs-target="#checkoutCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#checkoutCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Próximo</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h3 class="card-title">Resumo do Pedido</h3>
            <div id="checkoutOrderSummary" class="mb-3">
              <p class="text-muted">Carregando itens do carrinho...</p>
            </div>

            <div class="d-grid gap-2">
              <a href="index.html" class="btn btn-outline-secondary">Voltar ao catálogo</a>
              <button id="btnCheckoutPayPal" class="btn btn-primary">Pagar com PayPal</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="py-3">
  <div class="container text-center text-muted">&copy; 2026 Tailand Store - Todos os direitos reservados.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=BRL"></script>
<script src="assets/js/script.js"></script>
<script>
  // Auto-start carousel with 3.5s interval
  var carouselEl = document.querySelector('#checkoutCarousel');
  if (carouselEl) {
    var carousel = new bootstrap.Carousel(carouselEl, { interval: 3500, ride: 'carousel' });
  }

  // Populate order summary from localStorage cart
  function populateCheckoutSummary() {
    var cart = JSON.parse(localStorage.getItem('carrinho') || '[]');
    var container = document.getElementById('checkoutOrderSummary');
    if (!container) return;
    if (!cart || cart.length === 0) {
      container.innerHTML = '<p class="text-muted">Seu carrinho está vazio.</p>';
      return;
    }

    var total = 0;
    var html = '<ul class="list-unstyled mb-3">';
    cart.forEach(function(item) {
      var subtotal = item.preco * item.quantidadeCarrinho;
      total += subtotal;
      html += '<li class="d-flex mb-3 align-items-center">'
           + '<img src="' + item.imagem + '" alt="' + item.nome + '" style="width:64px;height:64px;object-fit:cover;border-radius:8px;margin-right:12px;">'
           + '<div><strong>' + item.nome + '</strong><br><small>Qtd: ' + item.quantidadeCarrinho + ' • R$ ' + item.preco.toFixed(2).replace('.', ',') + '</small></div>'
           + '<div class="ms-auto">R$ ' + subtotal.toFixed(2).replace('.', ',') + '</div>'
           + '</li>';
    });
    html += '</ul>';
    html += '<div class="fw-bold">Total: R$ ' + total.toFixed(2).replace('.', ',') + '</div>';
    container.innerHTML = html;
  }

  document.addEventListener('DOMContentLoaded', function() {
    populateCheckoutSummary();
  });
</script>
</body>
</html>
